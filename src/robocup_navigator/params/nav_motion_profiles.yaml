profiles:
  A:
    backup_distance: 0.20
    backup_speed: 0.14

    rotate_direction: "left"
    rotate_angle_deg: 150.0
    rotate_angular_speed: 1.4

    target_front_distance: 0.47

  B:
    backup_distance: 0.20
    backup_speed: 0.14

    rotate_direction: "right"
    rotate_angle_deg: 150.0
    rotate_angular_speed: 1.4

    target_front_distance: 0.47

## 해야할거
## B는 얼마나 더 빠져야 할지 돌려봐야함.
## A는 무조건 왼쪽 회전, B는 오른쪽 회전

## 실행명령 // ros2 run robocup_navigator robocup_navigator --ros-args -p side_mode:=A

